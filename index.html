<!DOCTYPE html>
<html>
<head>
<title>Hospital Patient Priority Handling Application</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Hospital Patient Priority Handling Application</h1>

<h2>Patient Registration</h2>

<form id="patientForm">

<label>Patient ID</label>
<input type="number" id="patientId" required>

<label>Name</label>
<input type="text" id="name" required>

<label>Age</label>
<input type="number" id="age" required>

<label>Symptoms</label>
<input type="text" id="symptoms" required>

<label>Priority Level</label>
<select id="priority" required>
<option value="">Select Priority</option>
<option value="Critical">Critical</option>
<option value="High">High</option>
<option value="Moderate">Moderate</option>
<option value="Mild">Mild</option>
<option value="Low">Low</option>
</select>

<button type="submit">Add Patient</button>

</form>

<h2>Registered Patients</h2>

<table id="patientTable">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Symptoms</th>
<th>Priority</th>
</tr>
</thead>

<tbody>

</tbody>

</table>
<h2>Serve Patient</h2>
<button onclick="servePatient()">Serve Next Patient</button>

</div>

<script src="script.js"></script>

</body>
</html>
